# Fixture corpus for agent-code-scanner-rules
# Each fixture is a public repo cloned by CI to verify rules behave as expected.
# Expected findings are per rule_id; an empty list means the fixture should produce no findings for that rule.

fixtures:
  - name: dvla
    description: "Reverse Labs damn-vulnerable-llm-agent — CTF with intentional AI security vulns"
    classification: vulnerable
    source: https://github.com/ReversecLabs/damn-vulnerable-llm-agent
    pin_ref: main
    expected_findings:
      "scope.god-agent-tool-count": 2          # tools.py has 2 Tool(...) constructions
      "stop.llm-output-to-dangerous-sink": 2   # transaction_db.py has 2 SQL injection sinks

  - name: react-agent
    description: "LangChain official ReAct agent template — minimal, modern, clean"
    classification: clean
    source: https://github.com/langchain-ai/react-agent
    pin_ref: main
    expected_findings: {}   # should produce zero findings

  - name: rag-research-agent
    description: "LangChain official RAG research agent template"
    classification: clean
    source: https://github.com/langchain-ai/rag-research-agent-template
    pin_ref: main
    expected_findings: {}

  - name: aeon
    description: "Aaron Mars's autonomous agent framework — multi-framework A2A clients"
    classification: partial
    source: https://github.com/aaronjmars/aeon
    pin_ref: main
    expected_findings:
      "scope.god-agent-tool-count": 1                  # one Tool() in a2a/langchain_client.py
      "sign.mcp-client-without-server-allowlist": 1    # MCP client connecting to gateway URL without allowlist
